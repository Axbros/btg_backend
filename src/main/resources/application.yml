server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: btg-commission-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/btg_commission?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: zawx0422
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

btg:
  jwt:
    secret: "btg-commission-jwt-secret-change-me-min-256-bits-please-use-long-random-string-in-production"
    expiration-ms: 86400000
  file:
    # 本地存储根目录（相对路径相对进程工作目录）
    upload-dir: ./uploads
    # 返回给前端的访问基址，须与实际访问域名一致（反代时需写公网域名）
    public-base-url: http://localhost:8080
    max-file-size-bytes: 10485760

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.btg.commission: INFO
