server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: btg-commission-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: jdbc:mysql://43.140.247.62:3306/finance?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    url: jdbc:mysql://localhost:3306/btg_commission?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
#    username: finance
#    password: AjxFG8bMP8AXmAL3
    username: root
    password: zawx0422
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 3s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # 关闭 SQL 打印到控制台；需排错时可改为 org.apache.ibatis.logging.slf4j.Slf4jImpl 并打开 DEBUG
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

btg:
  api:
    # 所有业务 REST 接口统一前缀（Controller、Security、生命周期过滤器均依赖此值）
    base-path: /api/v1
  jwt:
    secret: "btg-commission-jwt-secret-change-me-min-256-bits-please-use-long-random-string-in-production"
    expiration-ms: 86400000
  file:
    # 本地存储根目录（相对路径相对进程工作目录）
    upload-dir: ./uploads
    # 返回给前端的访问基址，须与实际访问域名一致（反代时需写公网域名）
    public-base-url: https://finance.flbxw.cn
    max-file-size-bytes: 10485760

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.btg.commission: INFO
    org.apache.ibatis: WARN
    com.baomidou.mybatisplus: WARN
